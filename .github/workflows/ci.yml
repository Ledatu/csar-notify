name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: csar-notify

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/csar-core
          path: csar-core

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: csar-notify/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: csar-notify
          args: --config .golangci.yml --timeout 5m

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24", "1.25"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: csar-notify

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/csar-core
          path: csar-core

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: csar-notify/go.sum

      - name: Verify dependencies
        working-directory: csar-notify
        run: go mod verify

      - name: Run tests
        working-directory: csar-notify
        run: go test -v -race -count=1 ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: csar-notify

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/csar-core
          path: csar-core

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: csar-notify/go.sum

      - name: Build binary
        working-directory: csar-notify
        run: go build -o /dev/null ./cmd/csar-notify
