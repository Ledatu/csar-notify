name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: csar-notify

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: csar-notify/go.sum

      - name: Install golangci-lint v2
        working-directory: csar-notify
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        working-directory: csar-notify
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: csar-notify

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: csar-notify/go.sum

      - name: Verify dependencies
        working-directory: csar-notify
        run: go mod verify

      - name: Run go vet
        working-directory: csar-notify
        run: go vet ./...

      - name: Run tests
        working-directory: csar-notify
        run: go test -v -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: csar-notify

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: csar-notify/go.sum

      - name: Build binary
        working-directory: csar-notify
        run: go build -o /dev/null ./cmd/csar-notify
